spring.application.name=QuickRxApplication
spring.datasource.url=jdbc:postgresql://localhost:5432/quickrx_db
spring.datasource.username=postgres
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

server.port=8080

# This tells Spring to look for the key in your Mac's environment variables
spring.ai.google.genai.api-key=${SPRING_AI_GOOGLE_GENAI_API_KEY}
spring.ai.google.genai.project-id=quickrx-ai-project
spring.ai.google.genai.chat.options.model=gemini-2.5-flash